<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엄마 품 자장가</title>
    <style>
        /* 앱의 전체적인 분위기를 따뜻하고 부드럽게 설정 */
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8f9fa; color: #333; margin: 0; padding: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; background: white; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        header { padding: 25px 20px; text-align: center; background: #6c5ce7; color: white; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; }
        h1 { margin: 0; font-size: 1.6rem; font-weight: 800; }
        
        /* 탭 버튼 스타일 */
        .tabs { display: flex; margin: 20px; background: #f1f2f6; border-radius: 30px; overflow: hidden; }
        .tab-btn { flex: 1; padding: 14px; border: none; background: none; font-size: 1rem; cursor: pointer; transition: 0.3s; color: #a4b0be; font-weight: bold; }
        .tab-btn.active { background: #6c5ce7; color: white; border-radius: 30px; box-shadow: 0 4px 10px rgba(108, 92, 231, 0.3); }
        
        /* 콘텐츠 영역 */
        .content-section { display: none; padding: 10px 20px 30px 20px; }
        .content-section.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 음악 리스트 스타일 */
        .track-card { background: #ffffff; padding: 18px; border-radius: 16px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #f1f2f6; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .track-info h3 { margin: 0 0 6px 0; font-size: 1.1rem; color: #2d3436; }
        .track-info p { margin: 0; font-size: 0.85rem; color: #636e72; }
        .play-btn { background: #00b894; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0, 184, 148, 0.3); transition: 0.2s; }
        .play-btn:active { transform: scale(0.95); }

        /* AI 모드 스타일 */
        .ai-section { text-align: center; padding-top: 30px; }
        .record-btn { background: #ff7675; color: white; border: none; padding: 16px 30px; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; width: 90%; box-shadow: 0 6px 15px rgba(255, 118, 117, 0.4); transition: 0.3s; }
        .record-btn:active { transform: scale(0.98); }
        .premium-badge { background: #ffeaa7; color: #d63031; font-size: 0.75rem; padding: 4px 10px; border-radius: 12px; font-weight: 900; vertical-align: middle; margin-left: 8px; letter-spacing: 1px;}
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🌙 코장코장 자장가</h1>
            <p style="margin: 8px 0 0 0; font-size: 0.95rem; opacity: 0.9;">우리 아이 통잠 프로젝트</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('basic')">🎵 기본 모드</button>
            <button class="tab-btn" onclick="switchTab('ai')">👩‍👧 엄마 목소리</button>
        </div>

        <div id="basic-mode" class="content-section active">
            <h2 style="font-size: 1.2rem; margin-bottom: 20px; color: #2d3436;">추천 수면 음악</h2>
            
            <div class="track-card">
                <div class="track-info">
                    <h3>따뜻한 별빛 오르골</h3>
                    <p>마음을 진정시키는 잔잔한 멜로디</p>
                </div>
                <button class="play-btn" onclick="togglePlay(this, 'https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3')">▶</button>
            </div>
            
            <div class="track-card">
                <div class="track-info">
                    <h3>토닥토닥 밤비 소리</h3>
                    <p>깊은 수면을 돕는 자연 백색소음</p>
                </div>
                <button class="play-btn" onclick="togglePlay(this, 'https://cdn.pixabay.com/download/audio/2021/08/09/audio_9b9a67a0da.mp3')">▶</button>
            </div>
            
            <div class="track-card">
                <div class="track-info">
                    <h3>포근한 자장가 피아노</h3>
                    <p>아기를 꿈나라로 이끄는 클래식</p>
                </div>
                <button class="play-btn" onclick="togglePlay(this, 'https://cdn.pixabay.com/download/audio/2022/02/07/audio_03d2b2edce.mp3')">▶</button>
            </div>
        </div>

        <div id="ai-mode" class="content-section ai-section">
            <h2 style="margin-bottom: 10px; color: #2d3436;">세상에 하나뿐인 자장가 <span class="premium-badge">PRO</span></h2>
            <p style="color: #636e72; margin-bottom: 35px; line-height: 1.6; font-size: 0.95rem;">
                아이가 칭얼거릴 때, 엄마가 옆에 있는 것처럼<br>세상에서 가장 편안한 목소리를 들려주세요.
            </p>
            
            <div style="font-size: 4rem; margin-bottom: 15px;">🎙️</div>
            
            <button class="record-btn" id="recordBtn" onclick="handleRecord()">엄마 목소리 10초 녹음하기</button>
            
            <div style="background: #f1f2f6; padding: 15px; border-radius: 12px; margin-top: 30px; text-align: left;">
                <p style="margin: 0; font-size: 0.85rem; color: #636e72;">💡 <strong>사용 팁:</strong> "우리아기 예쁜아기~" 처럼 평소 아이를 달랠 때 쓰는 따뜻한 톤으로 10초간 말해주세요.</p>
            </div>
            
            <p id="status-text" style="margin-top: 25px; font-weight: bold; color: #6c5ce7; font-size: 1.1rem;"></p>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        // 1. 탭 전환 로직
        function switchTab(tabId) {
            // 모든 탭과 콘텐츠 비활성화
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            
            if(tabId === 'basic') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('basic-mode').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('ai-mode').classList.add('active');
                
                // 엄마 목소리 탭으로 넘어가면 재생 중이던 음악 정지
                const player = document.getElementById('audio-player');
                player.pause();
                resetPlayButtons();
            }
        }

        // 2. 오디오 재생 및 정지 로직
        let currentBtn = null;
        function togglePlay(btn, src) {
            const player = document.getElementById('audio-player');
            
            // 재생 중인 버튼을 다시 누르면 일시정지
            if (currentBtn === btn && !player.paused) {
                player.pause();
                btn.innerText = '▶';
                btn.style.background = '#00b894';
                return;
            }

            // 다른 곡을 누르면 기존 버튼들 초기화
            resetPlayButtons();
            
            // 새 곡 재생
            player.src = src;
            player.play();
            btn.innerText = '⏸';
            btn.style.background = '#d63031'; // 일시정지 상태일 때 빨간색으로 변경
            currentBtn = btn;
        }

        // 모든 재생 버튼을 원래 상태(▶)로 되돌리는 함수
        function resetPlayButtons() {
            document.querySelectorAll('.play-btn').forEach(b => {
                b.innerText = '▶';
                b.style.background = '#00b894';
            });
        }

        // 3. AI 녹음 버튼 시뮬레이션 로직
        function handleRecord() {
            const btn = document.getElementById('recordBtn');
            const status = document.getElementById('status-text');
            
            if (btn.innerText === "엄마 목소리 10초 녹음하기") {
                btn.innerText = "🛑 녹음 완료 및 자장가 만들기";
                btn.style.background = "#d63031";
                status.innerText = "🔴 엄마의 따뜻한 목소리를 듣고 있어요...";
            } else {
                btn.innerText = "엄마 목소리 10초 녹음하기";
                btn.style.background = "#ff7675";
                status.innerText = "✨ 엄마표 AI 자장가 생성 완료! (테스트 모드)";
                // 향후 이곳에 실제 AI API 연동 코드가 들어갈 자리입니다.
            }
        }
    </script>
</body>
</html>
